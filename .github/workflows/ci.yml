name: CI

# Runs on every push and PR against main. Deliberately does NOT run the
# eval harness here - evals call the real Anthropic API and cost real
# money per run, so they're a separate, manually-triggered workflow
# (evals.yml) rather than something that fires on every commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Test (pytest)
        run: pytest
